name: Build OpenWrt 24.10 for XR30

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    # 安装编译依赖
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib gettext \
          git libncurses-dev libssl-dev python3-pip python3-setuptools \
          rsync swig unzip zlib1g-dev file wget xsltproc \
          ecj java-propose-classpath libelf-dev libfuse-dev libjson-c-dev \
          liblzo2-dev liblzma-dev libzstd-dev quilt u-boot-tools \
          python3-dev python3-pyelftools python3-yaml ccache \
          aria2 curl subversion \
          libdbus-1-dev libexpat1-dev libglib2.0-dev \
          bash-completion
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # 克隆OpenWrt源码
    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone -b ${{ env.REPO_BRANCH }} --single-branch --depth 1 ${{ env.REPO_URL }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # 缓存下载文件
    - name: Cache OpenWrt dl (downloads)
      uses: actions/cache@v4
      with:
        path: /workdir/openwrt/dl
        key: openwrt-dl-24.10-xr30-${{ hashFiles('diy-part1.sh') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-dl-24.10-xr30-${{ hashFiles('diy-part1.sh') }}-
          openwrt-dl-24.10-xr30-

    # 配置第三方feeds源
    - name: Load custom feeds
      run: |
        chmod +x diy-part1.sh
        cd openwrt
        $GITHUB_WORKSPACE/diy-part1.sh

    # 缓存编译目录
    - name: Cache OpenWrt build (staging_dir)
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/staging_dir
          /workdir/openwrt/build_dir
        key: openwrt-build-24.10-xr30-${{ hashFiles('config.txt', 'diy-part2.sh') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-build-24.10-xr30-${{ hashFiles('config.txt', 'diy-part2.sh') }}-
          openwrt-build-24.10-xr30-

    # 更新feeds
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    # 安装feeds
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # 加载自定义配置
    - name: Load custom configuration
      run: |
        [ -e config.txt ] && cp config.txt openwrt/.config
        chmod +x diy-part2.sh
        cd openwrt
        export GITHUB_WORKSPACE="${{ github.workspace }}"
        $GITHUB_WORKSPACE/diy-part2.sh

    # 验证CUPS汉化包是否正确创建
    - name: Verify CUPS Chinese package
      run: |
        cd openwrt
        echo "=== cups-zh-cn 包验证 ==="
        echo "--- Makefile ---"
        test -f package/cups-zh-cn/Makefile && echo "OK: Makefile 存在" || echo "FAIL: Makefile 不存在"
        echo ""
        echo "--- CUPS汉化文件数 ---"
        find package/cups-zh-cn/files/usr/share/cups/zh_CN/ -type f 2>/dev/null | wc -l
        echo ""
        echo "--- uci-defaults脚本 ---"
        test -f package/base-files/files/etc/uci-defaults/98-cups-zh-cn && echo "OK: CUPS脚本存在" || echo "FAIL: CUPS脚本不存在"
        echo ""
        echo "--- fullconenat模块 ---"
        test -d package/iptables-mod-fullconenat && echo "OK: fullconenat存在" || echo "FAIL: fullconenat不存在"

    # SSH调试（可选）
    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'

    # 清理Tailscale缓存
    - name: Clean Go mod cache
      run: |
        cd openwrt
        rm -rf dl/go-mod-cache
        make package/tailscale/clean 2>/dev/null || true

    # 下载源码包 + defconfig
    - name: Download package
      run: |
        cd openwrt
        make defconfig
        # 强制禁用dnsmasq，使用dnsmasq-full（解决冲突）
        sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        sed -i 's/CONFIG_PACKAGE_dnsmasq=m/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    # 编译固件
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s | tee build.log
        echo "status=success" >> "$GITHUB_OUTPUT"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"

    # 验证编译结果
    - name: Verify build result
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        echo "=== 编译出的cups相关包 ==="
        find bin -name "*cups*" -type f 2>/dev/null || echo "未找到"
        echo ""
        echo "=== 固件文件 ==="
        ls -lh bin/targets/mediatek/filogic/*.itb 2>/dev/null || ls -lh bin/targets/mediatek/filogic/*.bin 2>/dev/null || echo "未找到固件"

    # 整理固件文件
    - name: Organize firmware files
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        mkdir -p release
        cp bin/targets/mediatek/filogic/*.{itb,bin,sha256sums} release/ 2>/dev/null || true
        cp -r bin/targets/mediatek/filogic/packages release/ 2>/dev/null || true
        echo "OpenWrt 24.10 for XR30 (MT7981B)" > release/build_info.txt
        echo "Build Date: $(date '+%Y-%m-%d %H:%M:%S')" >> release/build_info.txt
        echo "Target: mediatek/filogic" >> release/build_info.txt
        echo "Device: CMCC XR30" >> release/build_info.txt
        echo "Flash: 128MB NAND" >> release/build_info.txt
        echo "Features: CUPS+Avahi+WireGuard+pbr+Tailscale+ACME+frp+timecontrol+FullConeNAT" >> release/build_info.txt

    # 上传固件到 GitHub Release
    - name: Upload to GitHub Release
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v24.10-xr30-${{ env.FILE_DATE }}
        name: OpenWrt 24.10 XR30 ${{ env.FILE_DATE }}
        body: |
          ## OpenWrt 24.10 for XR30 (MT7981B)
          
          **构建时间**: ${{ env.FILE_DATE }}
          
          ### 设备信息
          - 设备: 中国移动 XR30
          - SoC: 联发科 MT7981B
          - 闪存: 128MB NAND
          - 内存: 512MB DDR4
          - USB: USB 3.0 × 1
          
          ### 功能特性
          - CUPS 打印服务 + Avahi 网络发现 + 中文界面
          - WireGuard VPN + pbr 策略路由
          - Tailscale 内网穿透
          - ACME 自动证书
          - frp 内网穿透
          - timecontrol 上网时间控制
          - ksmbd 文件共享
          - DDNS 动态域名
          - Full Cone NAT + UPnP
          - 广告屏蔽 + 性能监控
          
          ### 刷机说明
          1. 通过 TFTP 或 U-Boot 刷入固件
          2. 默认 IP: 192.168.1.1
          3. 默认用户名: root，无密码
          4. 首次启动会自动配置CUPS汉化和Full Cone NAT
        files: openwrt/release/*
        draft: false
        prerelease: false

    # 同时上传到 Artifact（备用）
    - name: Upload firmware artifact
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_24.10_XR30${{ env.FILE_DATE }}
        path: openwrt/bin/targets/mediatek/filogic/*
